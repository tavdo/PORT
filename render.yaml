services:
  - type: web
    name: port-disbursement-api
    runtime: node
    plan: starter
    region: frankfurt
    rootDir: .
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    disk:
      name: port-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_PATH
        value: /var/data/port.db
      - key: CORS_ORIGINS
        value: https://inquisitive-sprite-6e742f.netlify.app
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DEFAULT_USD_TO_GEL
        value: "2.7"
      - key: DEFAULT_PORT_STAY_HOURS
        value: "120"
      - key: SHIP_CACHE_TTL_SECONDS
        value: "3600"
      - key: SHIP_API_TIMEOUT_MS
        value: "8000"
      # Secrets you must set in the Render dashboard (sync: false hides them from this file):
      - key: SHIP_API_KEY
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
