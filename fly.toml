app = "port-disbursement-api"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  HOST = "0.0.0.0"
  PORT = "3000"
  DATABASE_PATH = "/data/port.db"
  DEFAULT_USD_TO_GEL = "2.7"
  DEFAULT_PORT_STAY_HOURS = "120"
  SHIP_CACHE_TTL_SECONDS = "3600"
  SHIP_API_TIMEOUT_MS = "8000"
  JWT_EXPIRES_IN = "7d"
  CORS_ORIGINS = "https://inquisitive-sprite-6e742f.netlify.app"

[[mounts]]
  source = "port_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
